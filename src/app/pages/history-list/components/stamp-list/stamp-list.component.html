<div class="container">
  <div class="flex-space-between">
    <p class="text-title text-md">My Stamps</p>
    <ion-icon class="text-xxl" name="filter-circle-outline"></ion-icon>
  </div>

  <div class="card-border history-item" *ngFor="let stamp of visibleStamps">
    <p class="flex-space-between text-description text-italic">
      <span>References ID:{{ stamp.historyId }}</span>
      <span class="order-status success">{{ stamp.status }}</span>
    </p>
    <div class="order-info flex-auto">
      <div class="info-details text-title text-sm">
        <p class="truncate-two-line">{{ stamp.type }}</p>
        <p class="text-description">{{ getLocaleDate(stamp.dateTime) }}</p>
      </div>
      <div class="info-amount text-sm text-end">
        <p class="text-title text-md">+ {{ stamp.stamp }} stamp</p>
      </div>
    </div>
  </div>

  <ion-infinite-scroll threshold="100px" (ionInfinite)="loadMoreStamps($event)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Loading more stamps...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
