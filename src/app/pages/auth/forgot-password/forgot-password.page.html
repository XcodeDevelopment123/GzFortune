<app-header [rootPage]="'home'" [isBackHeader]="true" [headerText]="'Forgot Password'"></app-header>

<ion-content [fullscreen]="true">
  <div class="banner-container">
    <div class="banner-content">
      <h2 class="banner-title">Forgot Password ?</h2>
      <p class="banner-subtitle">
        Enter your email to reset it and get back<br />
        to your account.
      </p>
    </div>
  </div>

  <div class="container no-padding">
    <div class="form-content flex-center">
      <div class="card">
        <div>
          <span class="text-title text-theme text-md">
            Choose how you want to reset your password:
          </span>
          <p class="text-description">We'll send you a temporary password to log back in</p>
          <div class="flex-center flex-auto login-option">
            <!-- <span
              (click)="loginType=LoginType.EMAIL"
              class="option"
              [ngClass]="{
              active:loginType===LoginType.EMAIL
            }">
              Email
            </span> -->
            <span
              (click)="loginType=LoginType.PHONE"
              class="option"
              [ngClass]="{
              active:loginType===LoginType.PHONE
            }">
              Phone Number
            </span>
          </div>
        </div>
        <form *ngIf="form" [formGroup]="form" (ngSubmit)="submit()">
          <!-- <app-general-input
            [title]="'Email'"
            [placeholder]="'JohnDee@gmail.com'"
            [boldTitle]="true"
            [inputControl]="emailCtrl">
          </app-general-input> -->
          <app-phone-number-input
            [title]="'Phone Number'"
            [placeholder]="'+60 xxxxxxxxx'"
            [boldTitle]="true"
            formControlName="phoneNumber"
            *ngIf="loginType===LoginType.PHONE"></app-phone-number-input>

          <ion-row *ngIf="isFailed" class="inline-error">
            <ion-text color="danger">
              <ion-icon name="alert-circle-outline"></ion-icon>
              <small> {{ failedMessage }} </small>
            </ion-text>
          </ion-row>

          <div class="flex-center submit-btn">
            <ion-button type="submit" mode="ios">Submit</ion-button>
          </div>
        </form>
      </div>
    </div>
  </div>
</ion-content>
