<p>{{ !showSelectLabel ? title : '' }}</p>

<div>
  <ion-select
    *ngIf="!showSelectLabel"
    [className]="'select-list'"
    [multiple]="multiple"
    [interface]="interface"
    [placeholder]="placeholder"
    okText="Choose Outlet"
    cancelText="Cancel Choice"
    fill="outline"
    mode="md"
    labelPlacement="stacked"
    [value]="value"
    (ionChange)="onValueChange($event.detail.value)"
    [formControl]="input">
    <ion-select-option *ngFor="let option of options" [value]="option.value">
      {{ option.label }}
    </ion-select-option>
  </ion-select>

  <ion-select
    *ngIf="showSelectLabel"
    [label]=""
    [className]="'select-list'"
    [multiple]="true"
    [interface]="interface"
    [placeholder]="placeholder"
    [okText]="okText"
    [cancelText]="cancelText"
    fill="outline"
    mode="md"
    labelPlacement="stacked"
    (ionChange)="inputChange()"
    [formControl]="input">
    <ion-select-option *ngFor="let option of options" [value]="option.value">
      {{ option.label }}
    </ion-select-option>
  </ion-select>
</div>
