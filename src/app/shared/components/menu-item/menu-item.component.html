<div #root [id]="item.itemName" class="menu-item">
  <div>
    <img
      class="menu-image"
      [src]="item.image || 'assets/images/placeholder.png'"
      [alt]="item.itemName" />
    <div class="item-name">
      <h3>{{ item.itemName }}</h3>
    </div>
    <div class="item-description" *ngIf="item.itemDescription">
      {{ item.itemDescription }}
    </div>
  </div>

  <div class="item-price">$ {{ item.price.toFixed(2) }}</div>
</div>
