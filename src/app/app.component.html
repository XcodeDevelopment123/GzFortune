<ion-app>
  <ion-menu contentId="main-content" type="overlay" side="end" swipeGesture="false">
    <ion-content>
      <div class="app-logo flex-auto">
        <!-- <img load="lazy" src="/assets/images/app-logo.png" /> -->
        <p class="text-title">Fortune Claypot</p>
      </div>
      <ion-list>
        <div *ngIf="isAuthenticated">
          <p class="text-title category-label">Account</p>
          <ion-menu-toggle auto-hide="false" *ngFor="let p of accountPages; let i = index">
            <div></div>
            <ion-item
              class="account-option-item"
              [routerDirection]="p.routerDirection"
              [routerLink]="[p.url]"
              detail="false"
              routerLinkActive="selected">
              <ion-icon aria-hidden="true" slot="start" [name]="p.icon"></ion-icon>
              <ion-label>{{ p.title }}</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </div>

        <div>
          <p class="text-title category-label">General</p>
          <ion-menu-toggle auto-hide="false" *ngFor="let p of generalPages; let i = index">
            <ion-item
              *ngIf="!p.isOpenBrowser"
              class="account-option-item"
              [routerDirection]="p.routerDirection"
              [routerLink]="[p.url]"
              detail="false"
              routerLinkActive="selected">
              <ion-icon aria-hidden="true" slot="start" [name]="p.icon"></ion-icon>
              <ion-label>{{ p.title }}</ion-label>
            </ion-item>

            <ion-item
              *ngIf="p.isOpenBrowser"
              class="account-option-item"
              (click)="openBrowser(p.url)">
              <ion-icon aria-hidden="true" slot="start" [name]="p.icon"></ion-icon>
              <ion-label>{{ p.title }}</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </div>

        <ion-item
          *ngIf="isAuthenticated"
          class="account-option-item"
          detail="false"
          button
          (click)="onLogout()">
          <ion-icon aria-hidden="true" slot="start" name="log-out-outline"></ion-icon>
          <ion-label>Logout</ion-label>
        </ion-item>

        <div class="social-logo flex-auto">
          <ion-icon
            (click)="openBrowser('https://www.facebook.com/luckypot7687')"
            name="logo-facebook"></ion-icon>
          <ion-icon
            (click)="openBrowser('https://www.instagram.com/luckypotsdnbhd/')"
            name="logo-instagram"></ion-icon>
        </div>
        <div class="version-text text-description flex-column">
          <!-- <p>Secure Payment</p>
          <img load="lazy" class="curlec-logo" src="assets/icon/curlec-logo.svg" />
          <p>Copyright 2025 Developer Sdn. Bhd. (12345678)</p> -->
          <p>Version {{ Appvertion }}</p>
          <p>{{ DeviceName }}</p>
        </div>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
  <app-loading *ngIf="loading"></app-loading>
</ion-app>
